<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Vertical product line / supply hose extending up -->
  <rect x="60" y="2" width="5" height="20" fill="#E8ECEF" stroke="#8A8E92" stroke-width="0.6"/>
  <rect x="58" y="20" width="9" height="3" fill="#8A8E92"/>

  <!-- Motor on top of filler -->
  <rect x="42" y="20" width="14" height="9" rx="1" fill="#6A6E72" stroke="#3A3D40" stroke-width="0.6"/>
  <circle cx="49" cy="24.5" r="2" fill="#3A3D40"/>
  <rect x="44" y="29" width="10" height="2" fill="#5A5E62"/>

  <!-- Filler housing (left station) -->
  <rect x="34" y="31" width="28" height="20" fill="#D5D9DC" stroke="#6A6E72" stroke-width="0.6"/>
  <rect x="34" y="31" width="28" height="3" fill="#A8ACB0"/>
  <line x1="38" y1="38" x2="58" y2="38" stroke="#8A8E92" stroke-width="0.4"/>
  <line x1="38" y1="44" x2="58" y2="44" stroke="#8A8E92" stroke-width="0.4"/>

  <!-- Filler fill heads dropping down -->
  <rect x="42" y="51" width="2" height="6" fill="#5A5E62"/>
  <rect x="48" y="51" width="2" height="6" fill="#5A5E62"/>
  <rect x="54" y="51" width="2" height="6" fill="#5A5E62"/>

  <!-- Connecting hardware between stations -->
  <rect x="62" y="36" width="6" height="3" fill="#A8ACB0"/>
  <rect x="62" y="42" width="6" height="3" fill="#A8ACB0"/>

  <!-- Seamer housing (right station, with logo plate) -->
  <rect x="68" y="26" width="30" height="32" rx="1" fill="#E8ECEF" stroke="#6A6E72" stroke-width="0.6"/>
  <rect x="68" y="26" width="30" height="3" fill="#C8CCD0"/>

  <!-- Teal Wild Goose-style hexagon plate -->
  <polygon points="76,36 90,36 94,43 90,50 76,50 72,43" fill="#5B9BA5" stroke="#3A6970" stroke-width="0.5"/>
  <polygon points="78,38 88,38 91,43 88,48 78,48 75,43" fill="none" stroke="#E8ECEF" stroke-width="0.4"/>

  <!-- Conveyor belt -->
  <rect x="6" y="58" width="116" height="8" fill="#2E2E2E" stroke="#1A1A1A" stroke-width="0.6"/>
  <rect x="8" y="60" width="112" height="4" fill="#1A1A1A"/>
  <line x1="20" y1="62" x2="26" y2="62" stroke="#555" stroke-width="0.6"/>
  <line x1="34" y1="62" x2="40" y2="62" stroke="#555" stroke-width="0.6"/>
  <line x1="60" y1="62" x2="66" y2="62" stroke="#555" stroke-width="0.6"/>
  <line x1="84" y1="62" x2="90" y2="62" stroke="#555" stroke-width="0.6"/>

  <!-- ===== CANS (Sensory Overload label) ===== -->
  <!-- Reusable can group via <symbol> -->
  <defs>
    <symbol id="soCan" viewBox="0 0 8 14" overflow="visible">
      <!-- Body: navy base -->
      <rect x="0" y="0" width="8" height="14" rx="0.5" fill="#172447"/>
      <!-- Top dark rim -->
      <rect x="0" y="0" width="8" height="1.5" fill="#0E1730"/>
      <!-- Bottom dark rim -->
      <rect x="0" y="12.5" width="8" height="1.5" fill="#0E1730"/>
      <!-- Upper geometric pattern (red/teal/orange dots) -->
      <rect x="0.5" y="2" width="1.5" height="1.5" fill="#E63946"/>
      <rect x="2.5" y="2.3" width="1.2" height="1.2" fill="#34A0A4"/>
      <rect x="4.3" y="2" width="1.5" height="1.5" fill="#E5783D"/>
      <rect x="6.2" y="2.3" width="1.3" height="1.3" fill="#34A0A4"/>
      <!-- White text band ("SENSORY OVERLOAD") -->
      <rect x="0.5" y="5.2" width="7" height="1.4" fill="#F5F5F5"/>
      <rect x="1.2" y="7" width="5.6" height="0.9" fill="#F5F5F5"/>
      <!-- Lower geometric pattern -->
      <rect x="0.5" y="9.2" width="1.4" height="1.4" fill="#E5783D"/>
      <rect x="2.3" y="9.4" width="1.3" height="1.3" fill="#172447"/>
      <rect x="4.1" y="9.2" width="1.4" height="1.4" fill="#34A0A4"/>
      <rect x="5.9" y="9.4" width="1.5" height="1.5" fill="#E63946"/>
      <!-- Top opening (silver lid) -->
      <ellipse cx="4" cy="0" rx="4" ry="1" fill="#C8CCD0"/>
      <ellipse cx="4" cy="0" rx="2.6" ry="0.5" fill="#E8ECEF"/>
    </symbol>
  </defs>

  <!-- Cans placed across the line -->
  <use href="#soCan" x="10" y="46" width="8" height="14"/>
  <use href="#soCan" x="22" y="46" width="8" height="14"/>
  <use href="#soCan" x="34" y="46" width="8" height="14"/>
  <use href="#soCan" x="46" y="46" width="8" height="14"/>
  <use href="#soCan" x="62" y="46" width="8" height="14"/>
  <use href="#soCan" x="76" y="46" width="8" height="14"/>
  <use href="#soCan" x="88" y="46" width="8" height="14"/>
  <use href="#soCan" x="100" y="46" width="8" height="14"/>
  <use href="#soCan" x="112" y="46" width="8" height="14"/>

  <!-- Control panel on left side -->
  <rect x="2" y="42" width="14" height="20" rx="1" fill="#D5D9DC" stroke="#6A6E72" stroke-width="0.6"/>
  <rect x="3.5" y="44" width="11" height="9" fill="#1F2D3D"/>
  <rect x="4.5" y="45" width="9" height="7" fill="#2C4458"/>
  <circle cx="9" cy="58" r="2.2" fill="#E74C3C" stroke="#7B241C" stroke-width="0.4"/>
  <circle cx="9" cy="58" r="1" fill="#F5B7B1"/>

  <!-- Yellow E-stop on right end of conveyor -->
  <rect x="118" y="56" width="6" height="6" fill="#D5D9DC" stroke="#6A6E72" stroke-width="0.5"/>
  <circle cx="121" cy="59" r="1.8" fill="#F1C40F" stroke="#7D6608" stroke-width="0.4"/>

  <!-- Top rail of frame -->
  <rect x="10" y="66" width="108" height="2" fill="#A8ACB0"/>

  <!-- Vertical frame legs -->
  <rect x="18" y="68" width="2.5" height="34" fill="#C8CCD0"/>
  <rect x="40" y="68" width="2.5" height="34" fill="#C8CCD0"/>
  <rect x="86" y="68" width="2.5" height="34" fill="#C8CCD0"/>
  <rect x="108" y="68" width="2.5" height="34" fill="#C8CCD0"/>

  <!-- Lower cross brace -->
  <rect x="18" y="92" width="92.5" height="2" fill="#A8ACB0"/>

  <!-- Wheels -->
  <circle cx="19" cy="106" r="4" fill="#5C2E1F" stroke="#1A1A1A" stroke-width="0.6"/>
  <circle cx="19" cy="106" r="1.5" fill="#2A2A2A"/>
  <circle cx="41" cy="106" r="4" fill="#5C2E1F" stroke="#1A1A1A" stroke-width="0.6"/>
  <circle cx="41" cy="106" r="1.5" fill="#2A2A2A"/>
  <circle cx="87" cy="106" r="4" fill="#5C2E1F" stroke="#1A1A1A" stroke-width="0.6"/>
  <circle cx="87" cy="106" r="1.5" fill="#2A2A2A"/>
  <circle cx="109" cy="106" r="4" fill="#5C2E1F" stroke="#1A1A1A" stroke-width="0.6"/>
  <circle cx="109" cy="106" r="1.5" fill="#2A2A2A"/>
</svg>
