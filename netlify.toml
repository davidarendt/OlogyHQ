[build]
  command = "cd client && npm install && npm run build"
  publish = "client/build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["node-cron"]

[functions."label-email-thursday"]
  schedule = "0 18 * * 4"

[functions."label-email-friday"]
  schedule = "0 12 * * 5"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
